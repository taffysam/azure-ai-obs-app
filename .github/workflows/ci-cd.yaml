name: AI Observability CI/CD

on:
  push:
    branches:
      - main

env:
  ACR_NAME: acrtafaiobs
  IMAGE_NAME: ai-observability-app
  RESOURCE_GROUP: rg-taf-ai-observability
  AKS_CLUSTER: aks-taf-ai-obs
  NAMESPACE: ai-observability

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: |
          az acr login --name $ACR_NAME

      - name: Build Docker Image
        run: |
          docker build -t $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }} .

      - name: Push Docker Image
        run: |
          docker push $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}

      - name: Get AKS Credentials
        run: |
          az aks get-credentials \
            --resource-group $RESOURCE_GROUP \
            --name $AKS_CLUSTER \
            --overwrite-existing

      - name: Update Kubernetes Deployment
        run: |
          kubectl set image deployment/llm-app \
          llm-app=$ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }} \
          -n $NAMESPACE

      - name: Verify Rollout
        run: |
          kubectl rollout status deployment/llm-app -n $NAMESPACE